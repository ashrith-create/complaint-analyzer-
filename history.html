<!DOCTYPE html>
<html>
<head>
    <title>Complaint History</title>
</head>
<body>

<h1>📊 Complaint History</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Complaint</th>
        <th>Category</th>
        <th>Urgency</th>
        <th>Sentiment</th>
    </tr>

    {% for row in data %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
        <td>{{ row[4] }}</td>
    </tr>
    {% endfor %}

</table>

<br>
<a href="/">⬅ Back</a>

</body>
</html>
